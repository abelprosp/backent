services:
  postgres:
    image: postgres:16-alpine
    container_name: backent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-backent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-backent_secret}
      POSTGRES_DB: ${POSTGRES_DB:-backent_platform}
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - backent_postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U backent -d backent_platform']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: backent-redis
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - backent_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: backent-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-backent_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-backent_minio_secret}
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    volumes:
      - backent_minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: backent-api
    restart: unless-stopped
    ports:
      - '127.0.0.1:4000:4000'
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_USE_SSL: 'false'
      API_PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.backent.cloud/api/v1}
    container_name: backent-web
    restart: unless-stopped
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.backent.cloud/api/v1}
    depends_on:
      - api

  landing:
    build:
      context: ..
      dockerfile: docker/Dockerfile.landing
    container_name: backent-landing
    restart: unless-stopped
    ports:
      - '127.0.0.1:3002:3002'
    environment:
      NODE_ENV: production
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: backent-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
      - landing

  prometheus:
    image: prom/prometheus:latest
    container_name: backent-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - backent_prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: backent-grafana
    restart: unless-stopped
    ports:
      - '3003:3000'
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - backent_grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  loki:
    image: grafana/loki:2.9.4
    container_name: backent-loki
    restart: unless-stopped
    ports:
      - '3100:3100'
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - backent_loki_data:/loki

volumes:
  backent_postgres_data:
  backent_redis_data:
  backent_minio_data:
  backent_prometheus_data:
  backent_grafana_data:
  backent_loki_data:

networks:
  default:
    name: backent-network
