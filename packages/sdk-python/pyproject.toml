[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "backent"
version = "0.1.0"
description = "Backent Python SDK"
requires-python = ">=3.9"
dependencies = ["requests>=2.28.0"]

[project.optional-dependencies]
dev = ["pytest"]

[tool.setuptools.packages.find]
where = ["."]
include = ["backent*"]
